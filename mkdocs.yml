site_name: License Maven Plugin
site_url: https://mathieu.carbou.me/license-maven-plugin/
site_description: Official & Original Maven plugin to manage license headers in source files
site_author: Mathieu Carbou

repo_url: https://github.com/mathieucarbou/license-maven-plugin
repo_name: mathieucarbou/license-maven-plugin
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mathieucarbou/license-maven-plugin

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Goals: goals.md
  - Configuration: configuration.md
  - License Templates: license-templates.md
  - Properties & Placeholders: properties.md
  - Comment Styles: comment-styles.md
  - Custom Header Styles: header-styles.md
  - Multi-Licensing: multi-licensing.md
  - Dependency Enforcement: dependency-enforcement.md
  - SCM Integration:
      - Overview: scm/index.md
      - Git: scm/git.md
      - Subversion: scm/svn.md
      - Filesystem: scm/filesystem.md
  - Releases: releases.md
  - Development: development.md
  - Contributors: contributors.md
